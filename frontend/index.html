<!DOCTYPE html>
<html>
<head>
    <title>Katalog Naura</title>
</head>
<body>

    <h1 id="judul"></h1>
    <p id="owner"></p>

    <ul id="list"></ul>

    <h3>Tambah Item Baru</h3>

    <input type="text" id="newItem" placeholder="Masukkan item">
    <button onclick="tambahItem()">Tambah</button>

    <script>
        const API_URL = "/api";

        function loadData() {
            fetch(API_URL + "/info")
            .then(res => res.json())
            .then(data => {

                document.getElementById("judul").innerText = data.judul_katalog;
                document.getElementById("owner").innerText =
                    "Nama: " + data.pemilik + " | NIM: " + data.nim;

                let list = document.getElementById("list");
                list.innerHTML = "";

                data.items.forEach(item => {
                    let li = document.createElement("li");
                    li.innerText = item;
                    list.appendChild(li);
                });
            });
        }

        function tambahItem() {
            const item = document.getElementById("newItem").value;

            fetch(API_URL + "/add-item", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    item: item
                })
            })
            .then(res => res.json())
            .then(data => {
                document.getElementById("newItem").value = "";
                loadData();
            });
        }

        loadData();
    </script>

</body>
</html>
