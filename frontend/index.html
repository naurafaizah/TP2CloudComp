<!DOCTYPE html>
<html>
<head>
    <title>Katalog Naura</title>
</head>
<body>
    <h1 id="judul"></h1>
    <p id="owner"></p>
    <ul id="list"></ul>

    <script>
        const API_URL = "/api";
        fetch(API_URL + "/info")
        .then(res => res.json())
        .then(data => {
            document.getElementById("judul").innerText = data.judul_katalog;
            document.getElementById("owner").innerText = data.pemilik + " - " + data.nim;

            let list = document.getElementById("list");
            data.items.forEach(item => {
                let li = document.createElement("li");
                li.innerText = item;
                list.appendChild(li);
            });
        });
    </script>
</body>
</html>
