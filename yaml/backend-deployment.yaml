apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: naurafaizah/backend-naura:latest
          ports:
            - containerPort: 5000
          env:
            - name: NAMA_PRAKTIKAN
              value: "Naura"
            - name: NIM_PRAKTIKAN
              value: "12345678"